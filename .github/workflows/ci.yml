name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: webapp

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Build
        run: CI=true npm run build

  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: donk_ai_lab
          POSTGRES_USER: labuser
          POSTGRES_PASSWORD: labpass123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U labuser -d donk_ai_lab"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://labuser:labpass123@localhost:5432/donk_ai_lab

    defaults:
      run:
        working-directory: ml-service

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate challenge definitions
        run: python -m challenges.validate

      - name: Compile Python modules
        run: python -m compileall api.py database.py rule_based_chatbot.py challenges routers

      - name: Import FastAPI app
        run: python -c "from api import app; assert app"

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml-service/requirements.txt

      - name: Install Python lint dependencies
        run: python -m pip install ruff

      - name: Lint backend
        run: ruff check ml-service --select E9,F

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install frontend dependencies
        working-directory: webapp
        run: npm ci

      - name: Lint frontend
        working-directory: webapp
        run: npm run lint

  docker:
    name: Docker Compose Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build compose services
        run: docker compose build
